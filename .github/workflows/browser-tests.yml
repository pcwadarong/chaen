name: Browser Tests

on:
  pull_request:
  workflow_dispatch:
    inputs:
      suite:
        description: Run browser smoke or full suite
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full
  schedule:
    - cron: '0 18 * * 1'

jobs:
  browser-smoke:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('package.json') }}

      - name: Install Playwright Chromium
        run: pnpm run test:browser:install

      - name: Run browser smoke suite
        run: pnpm run test:browser:smoke

      - name: Upload browser-smoke test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-artifacts
          path: |
            output/playwright/report
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  browser-full:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'full')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('package.json') }}

      - name: Install Playwright Chromium
        run: pnpm run test:browser:install

      - name: Run full browser suite
        run: pnpm run test:browser

      - name: Upload browser-full test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-full-artifacts
          path: |
            output/playwright/report
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
