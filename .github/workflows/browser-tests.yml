name: Browser Tests

on:
  pull_request:
  workflow_dispatch:
    inputs:
      suite:
        description: Run browser smoke or full suite
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full
  schedule:
    - cron: '0 18 * * 1'

jobs:
  browser-smoke:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm run test:browser:install

      - name: Run browser smoke suite
        run: pnpm run test:browser:smoke

  browser-full:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'full')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm run test:browser:install

      - name: Run full browser suite
        run: pnpm run test:browser:full
